<!DOCTYPE html>
<html dir="rtl" lang="he">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>קופסת הקלפים של מיכל</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
      /* UI/UX Premium Architecture by Tנופת */
      :root { 
        --primary-color: #2d3436; 
        --accent-color: #00b894; 
        --bg-color: #f0f4f8; 
        --mystic-back: linear-gradient(135deg, #ffffff, #f1f2f6);
        --border-gold: rgba(212, 175, 55, 0.25);
        --card-texture: radial-gradient(circle at 50% 50%, rgba(240, 240, 240, 0.1) 0%, rgba(0, 0, 0, 0) 100%), 
                        repeating-linear-gradient(0deg, rgba(45, 52, 54, 0.01) 0px, rgba(45, 52, 54, 0.01) 1px, transparent 1px, transparent 11px), 
                        repeating-linear-gradient(90deg, rgba(45, 52, 54, 0.01) 0px, rgba(45, 52, 54, 0.01) 1px, transparent 1px, transparent 11px);
      }
      
      body { 
        font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; 
        display: flex; flex-direction: column; justify-content: center; align-items: center; 
        height: 100vh; margin: 0; background-color: var(--bg-color); 
        transition: background-color 1.2s ease; overflow: hidden; position: relative;
      }

      .app-header {
        position: absolute; top: 30px; left: 0; right: 0;
        font-size: 2.2rem; font-weight: 900; color: rgba(45, 52, 54, 0.05); 
        text-align: center; user-select: none; pointer-events: none; z-index: 0;
      }

      .signature {
        position: absolute; bottom: 15px; right: 20px;
        font-size: 0.75rem; color: rgba(45, 52, 54, 0.15);
        letter-spacing: 0.5px; user-select: none; z-index: 0;
        font-weight: 400; direction: rtl;
      }

      .scene { width: 85%; max-width: 360px; height: 470px; perspective: 1500px; z-index: 1; }
      
      .card-wrap {
        width: 100%; height: 100%; position: relative;
        transform-style: preserve-3d;
        /* שילוב סיבוב עם שינוי גודל עומק (Depth Scaling) */
        transition: transform 0.85s cubic-bezier(0.4, 0, 0.2, 1);
      }

      /* בזמן ההיפוך הכרטיס גם מתרחק מעט (scale 0.93) כדי לייצר עומק תלת-ממדי */
      .card-wrap.is-flipped { 
        transform: rotateY(180deg) scale(0.93); 
      }

      .card-face {
        position: absolute; width: 100%; height: 100%;
        backface-visibility: hidden; border-radius: 32px;
        display: flex; flex-direction: column;
      }

      /* חזית הכרטיס - שילוב של צבע רך, צל עמוק וטקסטורת נייר */
      .card-front { 
        background-color: #fcfcfc;
        background-image: var(--card-texture);
        padding: 2.2rem; 
        justify-content: space-between; 
        box-sizing: border-box; 
        position: relative;
        overflow: hidden; 
        box-shadow: inset 0 0 30px rgba(0,0,0,0.01), 0 20px 50px rgba(45, 52, 54, 0.08);
      }

      /* אלמנט הברק המוזהב הרך (נע מימין לשמאל) */
      .card-shine {
        position: absolute;
        top: 0;
        right: -150%; 
        width: 70%;
        height: 100%;
        background: linear-gradient(
          to left, 
          rgba(255, 255, 255, 0) 0%, 
          rgba(212, 175, 55, 0.28) 50%, 
          rgba(255, 255, 255, 0) 100%
        );
        transform: skewX(22deg); 
        pointer-events: none;
        z-index: 5;
        filter: blur(6px);
      }

      .trigger-shine {
        animation: shineSweepRTL 1.2s cubic-bezier(0.3, 1, 0.4, 1);
      }

      @keyframes shineSweepRTL {
        0% { right: -150%; }
        100% { right: 150%; }
      }

      .card-back {
        background: var(--mystic-back);
        transform: rotateY(180deg);
        display: flex; justify-content: center; align-items: center;
        color: #d1d8e0; font-size: 3rem; border: 1px solid #f0f0f0;
        box-shadow: 0 20px 50px rgba(45, 52, 54, 0.08);
      }
      
      .card-back::after {
        content: ""; position: absolute; width: 82%; height: 85%;
        border: 1px solid var(--border-gold); border-radius: 22px;
      }

      /* עיצוב הטקסטים */
      .quote { font-size: 1.5rem; font-weight: bold; color: var(--primary-color); line-height: 1.45; margin-top: 10px; transition: opacity 0.3s; }
      .source { font-size: 0.9rem; color: #636e72; display: block; margin-top: 12px; font-style: italic; font-weight: 500; }
      .insight { font-size: 1.05rem; color: #0984e3; border-top: 1px solid rgba(0,0,0,0.03); padding-top: 20px; min-height: 55px; line-height: 1.4; }
      
      /* כפתור מרכזי מעוצב ומגיב */
      .btn { 
        background: var(--accent-color); color: white; border: none; padding: 16px; 
        border-radius: 50px; font-size: 1.1rem; font-weight: bold; cursor: pointer; 
        box-shadow: 0 8px 25px rgba(0,184,148,0.25); transition: transform 0.2s, box-shadow 0.2s; margin-top: 15px;
        position: relative; z-index: 6; outline: none;
      }
      .btn:active { transform: scale(0.96); box-shadow: 0 4px 10px rgba(0,184,148,0.2); }

      /* שורת כפתורי פעולה - סגנון Soft UI צף */
      .actions { display: flex; justify-content: space-around; padding-top: 5px; position: relative; z-index: 6; }
      .icon-wrapper {
        background: #ffffff; width: 45px; height: 45px; border-radius: 50px;
        display: flex; justify-content: center; align-items: center;
        box-shadow: 0 4px 15px rgba(0,0,0,0.04); border: 1px solid rgba(0,0,0,0.01);
        transition: transform 0.2s, box-shadow 0.2s;
      }
      .icon-wrapper:active { transform: scale(0.9); box-shadow: 0 2px 5px rgba(0,0,0,0.02); }
      .icon-btn { background: none; border: none; color: #b2bec3; font-size: 1.2rem; cursor: pointer; padding: 10px; transition: color 0.2s; outline: none; }
      .icon-btn.active { color: #e17055; }

      /* אנימציית טעינה (Skeleton Loader) פועמת */
      .skeleton-container { display: flex; flex-direction: column; gap: 10px; width: 100%; margin-top: 10px; }
      .skeleton-line { 
        height: 18px; background: #dfe6e9; border-radius: 4px; 
        animation: pulse 1.5s infinite ease-in-out; opacity: 0.6;
      }
      @keyframes pulse {
        0% { opacity: 0.4; }
        50% { opacity: 0.8; }
        100% { opacity: 0.4; }
      }

      /* מודל שמורים */
      #favModal {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(45, 52, 54, 0.4); display: none; justify-content: center; align-items: center; z-index: 10; backdrop-filter: blur(5px);
      }
      .modal-content { background: white; width: 85%; max-width: 400px; border-radius: 32px; padding: 25px; max-height: 70vh; overflow-y: auto; box-shadow: 0 20px 50px rgba(0,0,0,0.1); }
      .modal-content h3 { font-weight: 800; color: var(--primary-color); margin-bottom: 20px; }
      .modal-item { padding: 15px; border-bottom: 1px solid #f1f2f6; display: flex; justify-content: space-between; align-items: center; font-size: 0.9rem; animation: fadeIn 0.3s ease; }
      @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
  </head>
  <body>

    <div class="signature">Tנופת</div>
    <div class="app-header" id="headerTitle">קופסת הקלפים של מיכל</div>

    <div class="scene">
      <div class="card-wrap" id="cardWrap">
        <div class="card-face card-back">
          <i class="fa-solid fa-feather-pointed"></i>
        </div>
        
        <div class="card-face card-front">
          <div class="card-shine" id="cardShine"></div>

          <div id="textBlock" style="width: 100%;">
            <div id="quoteText" class="quote">
              <div class="skeleton-container">
                <div class="skeleton-line" style="width: 90%;"></div>
                <div class="skeleton-line" style="width: 75%;"></div>
                <div class="skeleton-line" style="width: 40%;"></div>
              </div>
            </div>
            <span id="sourceText" class="source"></span>
          </div>
          
          <div id="insightText" class="insight"></div>
          
          <button class="btn" onclick="getNextMysticQuote()">משפט נוסף</button>
          
          <div class="actions">
            <div class="icon-wrapper"><button class="icon-btn" onclick="toggleFavModal()"><i class="fa-solid fa-bookmark"></i></button></div>
            <div class="icon-wrapper"><button class="icon-btn" onclick="shareSmartLink()"><i class="fa-solid fa-share-nodes"></i></button></div>
            <div class="icon-wrapper"><button class="icon-btn" id="favBtn" onclick="toggleFavorite()"><i class="fa-solid fa-heart"></i></button></div>
          </div>
        </div>
      </div>
    </div>

    <div id="favModal" onclick="if(event.target == this) toggleFavModal()">
      <div class="modal-content">
        <h3 style="text-align:center; margin-top:0;">השמורים שלי</h3>
        <div id="favList"></div>
      </div>
    </div>

    <script>
      console.log("%c Tנופת %c Digital Signature Verified", "color: #00b894; font-weight: bold; font-size: 14px;", "color: gray;");

      const LOCAL_DATA_URL = "data.json";
      let allQuotes = [];
      let currentData = null;
      let nextData = null;
      const colors = ['#f0f4f8', '#e8f4f1', '#f3eef5', '#fcf9e8', '#f1f5f2', '#f2f6fc'];

      window.onload = async () => {
        try {
          const response = await fetch(LOCAL_DATA_URL);
          const data = await response.json();
          
          if(data.settings && data.settings.mainTitle) {
            document.getElementById('headerTitle').innerText = data.settings.mainTitle;
            document.title = data.settings.mainTitle;
          }
          
          allQuotes = data.quotes || [];

          if (allQuotes.length === 0) {
            document.getElementById('quoteText').innerText = "אין נתונים בקופסה.";
            return;
          }

          const urlParams = new URLSearchParams(window.location.search);
          const startId = parseInt(urlParams.get('id'));

          if (startId) {
            const specificQuote = allQuotes.find(q => q.id === startId);
            currentData = specificQuote || getRandomQuoteFromCache();
          } else {
            currentData = getRandomQuoteFromCache();
          }

          // השהיה קלה מאוד להעלמת ה-Skeleton בצורה נקייה לעין
          setTimeout(() => {
            renderQuote();
            prepareNextQuote();
            triggerShineEffect();
          }, 350);

        } catch (error) {
          console.error("שגיאה בטעינה:", error);
          document.getElementById('quoteText').innerText = "שגיאה בחיבור למחסן הנתונים.";
        }
      };

      function getRandomQuoteFromCache() {
        if (!allQuotes.length) return null;
        const randomIndex = Math.floor(Math.random() * allQuotes.length);
        return allQuotes[randomIndex];
      }

      function prepareNextQuote() {
        nextData = getRandomQuoteFromCache();
      }

      function getNextMysticQuote() {
        const wrap = document.getElementById('cardWrap');
        wrap.classList.add('is-flipped');
        document.body.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];

        setTimeout(() => {
          if (nextData) {
            currentData = nextData;
            renderQuote();
            wrap.classList.remove('is-flipped');
            
            // הפעלת הברק המלכותי ברגע שהכרטיס חוזר לחזית
            setTimeout(() => {
              triggerShineEffect();
            }, 300);

            prepareNextQuote();
          }
        }, 650);
      }

      function triggerShineEffect() {
        const shine = document.getElementById('cardShine');
        shine.classList.add('trigger-shine');
        setTimeout(() => {
          shine.classList.remove('trigger-shine');
        }, 1200);
      }

      function renderQuote() {
        if (!currentData) return;
        document.getElementById('quoteText').innerText = currentData.quote;
        document.getElementById('sourceText').innerText = currentData.source ? "- " + currentData.source : "";
        document.getElementById('insightText').innerText = currentData.insight || "";
        updateHeartIcon();
      }

      function shareSmartLink() {
        if (!currentData || !currentData.id) return;
        
        const baseUrl = window.location.href.split('?')[0];
        const shareUrl = baseUrl + "?id=" + currentData.id;
        const text = `משהו שחשבתי עליו בשבילך:\n"${currentData.quote}"\n\nלקריאה המלאה:\n${shareUrl}`;
        
        if (navigator.share) {
          navigator.share({ text: text }).catch(() => copyToClipboard(shareUrl));
        } else {
          copyToClipboard(shareUrl);
        }
      }

      function copyToClipboard(url) {
        const el = document.createElement('textarea');
        el.value = url; document.body.appendChild(el);
        el.select(); document.execCommand('copy');
        document.body.removeChild(el);
        alert('הקישור הועתק!');
      }

      function toggleFavorite() {
        if (!currentData) return;
        let favs = JSON.parse(localStorage.getItem('myFavs') || '[]');
        const idx = favs.findIndex(f => f.quote === currentData.quote);
        if (idx > -1) favs.splice(idx, 1);
        else favs.push(currentData);
        localStorage.setItem('myFavs', JSON.stringify(favs));
        updateHeartIcon();
      }

      function updateHeartIcon() {
        if (!currentData) return;
        let favs = JSON.parse(localStorage.getItem('myFavs') || '[]');
        const isFav = favs.some(f => f.quote === currentData.quote);
        document.getElementById('favBtn').classList.toggle('active', isFav);
      }

      function toggleFavModal() {
        const modal = document.getElementById('favModal');
        if (modal.style.display === 'flex') { 
          modal.style.display = 'none'; 
        } else {
          renderFavList();
          modal.style.display = 'flex';
        }
      }

      function renderFavList() {
        const list = document.getElementById('favList');
        let favs = JSON.parse(localStorage.getItem('myFavs') || '[]');
        
        list.innerHTML = favs.length ? favs.map((f, i) => `
          <div class="modal-item" style="cursor: pointer;" onclick="selectFavCard(${i}, event)">
            <span style="flex:1; margin-left:10px; text-align:right; font-weight:500;">${f.quote.substring(0, 45)}...</span>
            <button class="icon-btn active" style="z-index:12;" onclick="removeFav(${i}, event)"><i class="fa-solid fa-trash-can"></i></button>
          </div>
        `).join('') : '<p style="text-align:center; color:#b2bec3;">אין משפטים שמורים.</p>';
      }

      window.selectFavCard = (idx, event) => {
        let favs = JSON.parse(localStorage.getItem('myFavs') || '[]');
        currentData = favs[idx];
        renderQuote();
        document.getElementById('favModal').style.display = 'none';
        prepareNextQuote();
        setTimeout(() => { triggerShineEffect(); }, 200);
      };

      window.removeFav = (idx, event) => {
        event.stopPropagation(); 
        let favs = JSON.parse(localStorage.getItem('myFavs') || '[]');
        favs.splice(idx, 1);
        localStorage.setItem('myFavs', JSON.stringify(favs));
        renderFavList(); 
        updateHeartIcon();
      };
    </script>
  </body>
</html>
